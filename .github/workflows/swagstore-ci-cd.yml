name: SwagStore CI/CD

on:
  push:
    branches:
      - main
    paths:
      - '03-swagstore-cicd/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/swagstore-ci-cd.yml'
  workflow_dispatch:

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run SwagStore Jest tests
        run: npm run test:swagstore

      - name: Trigger Render deployment
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
            echo "Render deployment hook triggered."
          else
            echo "RENDER_DEPLOY_HOOK_URL is not configured. Use Render GitHub auto deploy or add this secret."
          fi

