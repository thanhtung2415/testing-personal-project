name: OrangeHRM UI Automation

on:
  push:
    paths:
      - '05-ui-automation-orangehrm/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/orangehrm-ui.yml'
  workflow_dispatch:

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run OrangeHRM UI tests
        run: npm run test:ui

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orangehrm-playwright-report
          path: playwright-report/orangehrm

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orangehrm-test-results
          path: test-results

